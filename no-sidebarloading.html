<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#ffffff;
}

.loading-box{
    width:280px;
    height:170px;
    background:#fff;
    border:2px solid #000;
    border-radius:8px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.spinner{
    width:48px;
    height:48px;
    border:5px solid #ddd;
    border-top:5px solid #000;
    border-radius:50%;
    animation:spin .8s linear infinite;
    margin-bottom:20px;
}

.loading-text{
    font-size:22px;
    font-weight:bold;
    color:#000;
    letter-spacing:2px;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="loading-box">
    <div class="spinner"></div>
    <div class="loading-text">LOADING...</div>
</div>

<script>
setTimeout(function(){
    window.location.href="no-sidebar.html";
},3000);
</script>

</body>
</html>
