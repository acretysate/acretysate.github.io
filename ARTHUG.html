    <style type="text/css">
        /* 全局样式 - 20年前怀旧风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            /* 纯黄色背景，高饱和度，类似老式网页底色 */
            background-color: #FFE500;
            /* 移除原有的斜纹装饰，纯色高饱和背景 */
            font-family: "宋体", "SimSun", "MS Sans Serif", serif;
            padding: 0;
            min-height: 100vh;
        }
        
        /* 主容器 - 相对布局，用于内容居中 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 20px 30px 20px;
        }
        
       /* 顶部图片区域 - 铺满左右屏幕，高度自动适应图片比例 */
        .top-image-area {
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            margin-top: 0;
            margin-bottom: 30px;
            background: #FFE500;  /* 背景色改为和页面一样的黄色，避免出现突兀色块 */
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            /* 不设置固定高度，让高度由图片内容撑开 */
            line-height: 0;
        }
        .top-image {
            width: 100%;
            /* 高度自动，保持比例但限制最大高度不超过220px */
            max-height: 1000px;
            object-fit: cover;
            display: block;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        /* 抖动动画 (怀旧小特效) */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        
        /* 闪烁动画 (延续原有) */
        @keyframes flicker {
            0% { opacity: 1; filter: brightness(1); }
            92% { opacity: 1; filter: brightness(1); }
            93% { opacity: 0.6; filter: brightness(0.85); }
            94% { opacity: 0.9; filter: brightness(0.95); }
            95% { opacity: 0.5; filter: brightness(0.8); }
            96% { opacity: 0.95; filter: brightness(0.98); }
            97% { opacity: 0.7; filter: brightness(0.9); }
            98% { opacity: 1; filter: brightness(1); }
            100% { opacity: 1; filter: brightness(1); }
        }
        
        .shake-effect {
            animation: shake 0.15s ease-in-out 0s 2;
        }
        
        .flicker-effect {
            animation: flicker 3s infinite;
        }
        
        /* 日志框 - 符纸背景保留原样，但背景色微调让整体高饱和黄色衬托 */
        .log-box {
            background: #FFFEF0;
            border: 3px solid #B8860B;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,200,0.8);
            margin: 0;
            position: relative;
        }
        
        /* 符纸纹理效果继续保留 */
        .paper-bg {
            background: #ffc800;
            background-image: 
                repeating-linear-gradient(
                    transparent 0px,
                    transparent 2px,
                    rgba(160, 120, 60, 0.08) 2px,
                    rgba(160, 120, 60, 0.08) 4px
                ),
                radial-gradient(circle at 10% 20%, rgba(200, 160, 80, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(200, 160, 80, 0.1) 0%, transparent 30%);
            border: 2px solid #C9A96E;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.3), inset 0 0 30px rgba(210, 170, 80, 0.2);
            position: relative;
        }
        
        .paper-bg::before {
            content: "";
            position: absolute;
            top: 10px;
            left: 15px;
            width: 80px;
            height: 80px;
            background: radial-gradient(ellipse, rgba(200,160,80,0.2) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .paper-bg::after {
            content: "";
            position: absolute;
            bottom: 10px;
            right: 15px;
            width: 80px;
            height: 80px;
            background: radial-gradient(ellipse, rgba(200,160,80,0.2) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .log-header {
            background: #A0522D;
            background: linear-gradient(to bottom, #B8652A, #8B4513);
            padding: 12px 20px;
            border-bottom: 2px solid #FFD700;
            color: #FFD700;
            font-size: 18px;
            font-weight: bold;
            font-family: "黑体", "SimHei", "MS Sans Serif", sans-serif;
            text-shadow: 1px 1px 0 #5C3317;
            letter-spacing: 2px;
        }
        
        /* 日志列表区域 - 怀旧滚动条样式 */
        .log-list {
            padding: 5px 0;
            max-height: 480px;
            overflow-y: auto;
        }
        
        /* 日志条目 - 改成20年前网站经典样式，类似论坛或后台记录风格 */
        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            border-bottom: 1px solid #D4B87A;
            transition: background 0.15s;
            cursor: pointer;
            background-color: #FFFEF5;
        }
        
        .log-item:hover {
            background-color: #FFF2CC;
        }
        
        /* 日志标题字体 - 更古典，小字号，像是2003年前后后台管理字体 */
        .log-title {
            font-size: 14px;
            color: #2C1A0C;
            font-weight: normal;
            font-family: "宋体", "SimSun", "MS Sans Serif", serif;
            letter-spacing: 1px;
            flex: 1;
        }
        
        /* 时间样式带灰色背景，老式风格 */
        .log-time {
            font-size: 11px;
            color: #6B4E1C;
            font-family: "Courier New", "宋体", monospace;
            background: #F0E5D2;
            padding: 3px 10px;
            border-radius: 12px;
            border: 1px solid #C3A35C;
            white-space: nowrap;
        }
        
        /* 左右侧边栏: 各5个图片从上到下排列 */
        .side-deco-column {
            width: 95px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
        }
        
        .side-img-item {
            width: 100%;
            text-align: center;
            transition: transform 0.2s;
            cursor: pointer;
        }
        
        .side-img-item img {
            width: 100%;
            max-width: 85px;
            border: none;
            display: block;
            margin: 0 auto;
            transition: all 0.15s ease;
        }
        
        .side-img-item img:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        
        /* 点亮效果：增加发光和边框 */
        .side-img-item.lit img {
            filter: brightness(1.2) drop-shadow(0 0 8px #FFD700);
            border-radius: 50%;
            box-shadow: 0 0 12px 3px #FFAA00, 0 0 5px 1px #FFD700;
            transform: scale(1.02);
        }
        
        /* 中间日志区域自适应 */
        .main-content {
            flex: 1;
            min-width: 0;
        }
        
        .flex-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
        }
        
        /* 返回按钮 - 保持原有古朴样式 */
        .back-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 8px 24px;
            background: #8B4513;
            color: #FFD700;
            text-decoration: none;
            border: 2px outset #CD853F;
            font-family: "宋体", "SimSun", serif;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        
        .back-btn:active {
            border: 2px inset #CD853F;
        }
        
        /* 滚动条样式保持怀旧 */
        .log-list::-webkit-scrollbar {
            width: 8px;
        }
        
        .log-list::-webkit-scrollbar-track {
            background: #F5E8C8;
            border-radius: 4px;
        }
        
        .log-list::-webkit-scrollbar-thumb {
            background: #B8860B;
            border-radius: 4px;
        }
        
        .empty-log {
            text-align: center;
            padding: 50px;
            color: #B8860B;
            font-size: 14px;
        }
        
        /* 调整容器内部边距 */
        @media (max-width: 780px) {
            .side-deco-column {
                width: 70px;
                gap: 12px;
            }
            .log-title {
                font-size: 12px;
            }
            .log-time {
                font-size: 9px;
                padding: 2px 6px;
            }
            .flex-row {
                gap: 12px;
            }
        }
        
        /* 顶部图片完全铺满左右而不留白，修正body边距 */
        body {
            overflow-x: hidden;
        }

    </style>

    // 存储点亮状态的集合
    let litItems = new Set(); // 存储唯一标识 "left-1", "right-3" 等

    // 为每个图片项添加点击事件
    function initClickableImages() {
        allItems.forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
                const side = this.getAttribute('data-side');
                const index = this.getAttribute('data-index');
                const key = `${side}-${index}`;
                
                // 切换点亮/熄灭状态
                if (litItems.has(key)) {
                    // 熄灭
                    litItems.delete(key);
                    this.classList.remove('lit');
                } else {
                    // 点亮
                    litItems.add(key);
                    this.classList.add('lit');
                }
                
                // 检查特定组合：左边第1,2,5 与 右边的第3,5 同时亮着
              const left1Lit = litItems.has('left-1');

    var blurredContent = content.replace(/窅/g, '<span style="filter:blur(2px); display:inline-block;">窅</span>');
    
    contentDiv.innerHTML = `
       
        <div><strong></strong><br><br>${blurredContent}</div>
    `;
    
    modal.style.display = 'flex';
}

// 关闭日志详情浮层
function closeLogModal() {
    document.getElementById('logModal').style.display = 'none';
}

// 生成日志列表
function renderLogs() {
    const logList = document.getElementById('logList');
    if (!logList) return;
    
    if (logs.length === 0) {
        logList.innerHTML = '<div class="empty-log">暂无日志记录，请稍后再来</div>';
        return;
    }
    
    let html = '';
    for (let i = 0; i < logs.length; i++) {
        const log = logs[i];
        const isCorrupted = (log.title === "The file is corrupted" || log.time === "The file is corrupted");
        
        if (isCorrupted) {
            // 损坏的日志：不可点击
            html += `
                <div class="log-item corrupted-log">
                    <div class="log-title">· ${log.title}</div>
                    <div class="log-time">${log.time}</div>
                </div>
            `;
        } else {
            // 正常日志：点击弹出浮层，显示对应的标题、时间、内容
            const safeTitle = log.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            const safeTime = log.time.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            const safeContent = log.content.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            html += `
                <div class="log-item" onclick="showLogModal('${safeTitle}', '${safeTime}', '${safeContent}')">
                    <div class="log-title">· ${log.title}</div>
                    <div class="log-time">${log.time}</div>
                </div>
            `;
        }
    }
    logList.innerHTML = html;
}
    
    // 抖动效果
    let isShaking = false;
    
    function startShake() {
        if (isShaking) return;
        isShaking = true;
        const img = document.getElementById('topImage');
        if (!img) return;
        img.classList.add('shake-effect');
        setTimeout(() => {
            img.classList.remove('shake-effect');
            isShaking = false;
        }, 300);
        let count = 0;
        const interval = setInterval(() => {
            if (count >= 2) {
                clearInterval(interval);
                return;
            }
            if (img) {
                img.classList.add('shake-effect');
                setTimeout(() => {
                    if (img) img.classList.remove('shake-effect');
                }, 150);
            }
            count++;
        }, 200);
    }
    
    function stopShake() {
        // 无需额外操作
    }
    
    // 加载完毕后渲染
    window.onload = function() {
        renderLogs();
        initClickableImages();
        
        if (window.status) window.status = "邺山面馆 · 日志系统 | 欢迎光临";
        console.log("==== 邺山面馆日志系统载入 ====");
        console.log("管理员: yeshan0578 | 当前日志条目: " + logs.length + " 条");
        console.log("二十年前的界面风格 | 背景纯黄高饱和度");
        console.log("图片点亮功能已启用 | 左边1,2,5 + 右边3,5 同时点亮将触发跳转");
        
        // 顶部图片加载失败处理
        const topImg = document.getElementById('topImage');
        if (topImg) {
            topImg.onerror = function() {
                this.style.backgroundColor = "#8B4513";
                this.style.minHeight = "120px";
                this.alt = "邺山面馆匾额";
            };
        }
        
        // 左右图片批量防错处理
        const allSideImgs = document.querySelectorAll('.side-img-item img');
        for (let i = 0; i < allSideImgs.length; i++) {
            allSideImgs[i].onerror = function() {
                if (!this.complete) return;
                this.style.width = "60px";
                this.style.height = "60px";
                this.style.backgroundColor = "#E0B873";
                this.style.border = "1px solid #a56b2f";
            };
        }
    };
    
    // 右键禁止
    document.oncontextmenu = function(e) {
        alert("邺山面馆管理系统，版权所有 © 2003");
        return false;
    };
</script>
