<script>


let racing=false;

let selected=null;



// ============================
// 在这里添加你的马名字

"夜幕降临",

"破晓之光",

"赤红风暴",
"白夜幽灵",
"黄金巨浪",
"黑暗贵族",
"午夜伯爵",
"银翼骑士",
"天空征服者",
"深红玫瑰",

"财富猎人",
"幸运皇帝",
"黄金赌徒",
"至尊幻影",
"黑曜风暴",
"传奇骑士",
"永夜之王",
"星辰战马",
"银河霸主",

"黑色猎鹰",
"赤焰君主",

"黄金皇冠",
"暗夜赌神",
"银色幽魂",
"财富之翼",
"荣耀之刃",
"王座守护者",
"无冕之王",

"午夜皇后",
"黑玫瑰",
"烈风骑士",
"黄金巨兽",
"深海霸主",
"黑铁公爵",
"白金幽灵",
"雷霆战神",
"暗影猎豹",
"皇家巨星",

"破碎王冠",
"血月骑士",
"夜之贵族",
"黄金审判",
"黑暗胜者",
"银月公爵",
"烈焰女王",

"最后一战",

"帝国闪电",
"午夜赌局",
"暴雨之王",
"深渊之光",
"皇家赌徒",
"胜利女神",
"命运之轮"

];



// 随机排序名字

function shuffle(array){

return array.sort(()=>Math.random()-0.5);

}




function bet(number){


if(racing)return;


selected=number;


document.getElementById("betText").innerHTML=

"已下注5000$："+number+"号";



}




function startRace(){



if(selected==null){


document.getElementById("result").innerHTML=

"请先下注";


return;


}



if(racing)return;


racing=true;



document.getElementById("startBtn").disabled=true;



let names=shuffle([...horseNames]);



for(let i=1;i<=7;i++){


document.getElementById("n"+i).innerHTML=

i+"号<br>"+names[i-1];


document.getElementById("h"+i).style.left="140px";


}




let horses=[];



for(let i=1;i<=7;i++){


horses.push({


id:i,


element:document.getElementById("h"+i),


distance:0,


speed:0.12+Math.random()*0.08



});


}



let finish=760;


function run(){


if(!racing)return;



horses.forEach(h=>{


// 随机速度变化

h.speed += (Math.random()-0.5)*0.005;



if(h.speed<0.3)
h.speed=0.3;


if(h.speed>1.5)
h.speed=1.5;




// 偶尔冲刺

if(Math.random()<0.01){

h.speed+=0.05;

}




h.distance+=h.speed;



if(h.distance>=finish){


h.distance=finish;


racing=false;



document.getElementById("result").innerHTML=

"🏆 WINNER<br>"+
h.id+"号";


document.getElementById("startBtn").disabled=true;



setTimeout(nextRound,3000);



}



h.element.style.transform=

"translateX("+h.distance+"px)";



});



if(racing){

requestAnimationFrame(run);

}



}



requestAnimationFrame(run);



}





function nextRound(){


let count=10;


let timer=setInterval(()=>{


document.getElementById("result").innerHTML=

"等待新一轮马匹......<br>"+count;



count--;



if(count<0){


clearInterval(timer);



selected=null;



document.getElementById("betText").innerHTML=

"请选择下注";



document.getElementById("result").innerHTML="";


document.getElementById("startBtn").disabled=false;



}



},1000);



}



</script>
