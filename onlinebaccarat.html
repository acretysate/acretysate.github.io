<!DOCTYPE html>
<html>

<head>

<title>ARTHUG CASINO Baccarat</title>


<style>


body{

margin:0;

height:100vh;

background:#006633;

font-family:Arial;

color:white;

display:flex;

justify-content:center;

align-items:center;

}



.game{

text-align:center;

}



h1{

font-size:55px;

margin:0;

letter-spacing:8px;

}



.subtitle{

font-size:25px;

margin-bottom:40px;

}



/*牌区域*/

.table{

display:flex;

justify-content:center;

gap:150px;

margin-bottom:40px;

}



.side{

font-size:25px;

}



.cards{

display:flex;

gap:15px;

margin-top:20px;

}



.card{

width:90px;

height:130px;

background:white;

color:black;

border-radius:10px;

display:flex;

justify-content:center;

align-items:center;

font-size:40px;

border:3px solid black;

}



.bet{

display:flex;

justify-content:center;

gap:30px;

}



.bet button,
.start{

width:150px;

height:60px;

font-size:25px;

cursor:pointer;

border:3px solid black;

}



#info{

margin-top:30px;

font-size:30px;

}


.count{

font-size:45px;

}



</style>


</head>


<body>



<div class="game">


<h1>百家乐</h1>

<div class="subtitle">

ARTHUG CASINO

</div>




<div class="table">


<div class="side">

庄家<br>

BANKER


<div class="cards">

<div class="card" id="b1">?</div>

<div class="card" id="b2">?</div>

</div>


</div>





<div class="side">


闲家<br>

PLAYER


<div class="cards">

<div class="card" id="p1">?</div>

<div class="card" id="p2">?</div>


</div>


</div>



</div>





<div class="bet">


<button onclick="choose('庄')">

庄

</button>


<button onclick="choose('和')">

和

</button>


<button onclick="choose('闲')">

闲

</button>


</div>




<br>


<button class="start" onclick="startGame()">

开始

</button>



<div id="info">

请点击开始

</div>


</div>






<script>


let playerChoice=null;

let started=false;



let bankerCards=[];

let playerCards=[];




function startGame(){


started=true;


playerChoice=null;


//恢复问号

document.getElementById("b1").innerHTML="?";
document.getElementById("b2").innerHTML="?";
document.getElementById("p1").innerHTML="?";
document.getElementById("p2").innerHTML="?";


//生成新牌

bankerCards=randomCards();

playerCards=randomCards();



document.getElementById("info").innerHTML=

"请选择下注";


}



function choose(choice){


if(!started){

return;

}


playerChoice=choice;


document.getElementById("info").innerHTML=

"已选择："+choice+" 1000$";


setTimeout(countDown,1000);



}





function countDown(){


let time=5;


let box=document.getElementById("info");


let timer=setInterval(()=>{


box.innerHTML=

"请稍等<br>"+time;


time--;



if(time<0){


clearInterval(timer);


openCards();


}


},1000);


}





function randomCards(){


let cards=[];


for(let i=0;i<2;i++){


cards.push(

Math.floor(Math.random()*10)+1

);


}


return cards;


}





function openCards(){



document.getElementById("info").innerHTML=

"正在开牌";



setTimeout(()=>{


document.getElementById("b1").innerHTML=bankerCards[0];

},500);



setTimeout(()=>{


document.getElementById("b2").innerHTML=bankerCards[1];

},1000);



setTimeout(()=>{


document.getElementById("p1").innerHTML=playerCards[0];

},1500);



setTimeout(()=>{


document.getElementById("p2").innerHTML=playerCards[1];

},2000);



setTimeout(showResult,4000);



}






function point(cards){


let total=0;


cards.forEach(c=>{


if(c>=10){

total+=0;

}

else{

total+=c;

}


});


return total%10;


}





function showResult(){


let banker=point(bankerCards);

let player=point(playerCards);


let result;



if(playerChoice=="庄"){


result="闲家 PLAYER 赢 你输了1000$";


}


if(playerChoice=="闲"){


result="庄家 BANKER 赢 你输了1000$";


}



if(playerChoice=="和"){


result="闲家 PLAYER 赢 你输了1000$";


}




document.getElementById("info").innerHTML=

`
庄家：
${bankerCards[0]} + ${bankerCards[1]}
=
${banker}点

<br><br>

闲家：
${playerCards[0]} + ${playerCards[1]}
=
${player}点

<br><br>

结果：

${result}

`;

setTimeout(()=>{

    started=false;

    document.getElementById("info").innerHTML +=

    "点击开始进行下一局";


},3000);



}





</script>


</body>

</html>
