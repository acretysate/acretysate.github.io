<!DOCTYPE html>
<html>

<head>

<title>Online Roulette</title>


<style>

body{

margin:0;
height:100vh;

background:#006633;

display:flex;

justify-content:center;

align-items:center;

font-family:Arial;

color:white;

}


.game{

display:flex;
gap:80px;

}



/*轮盘*/

.wheel{

width:380px;
height:380px;

border-radius:50%;

border:15px solid #222;

background:
conic-gradient(
green,
red,
black,
red,
black,
red,
black,
red,
black,
red,
black
);


display:flex;

justify-content:center;

align-items:center;


}


.wheel span{

background:white;

color:black;

width:70px;

height:70px;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

font-size:30px;

}



.rotate{

animation:spin 6s ease-out;

}



@keyframes spin{

0%{

transform:rotate(0deg);

}


100%{

transform:rotate(1800deg);

}

}




/*数字*/

.bet{

display:grid;

grid-template-columns:repeat(3,70px);

gap:8px;

}



.num{

height:50px;

border-radius:50%;

border:2px solid white;

display:flex;

justify-content:center;

align-items:center;

cursor:pointer;

font-size:20px;

}



.red{

background:#a00000;

}


.black{

background:#111;

}


.green{

background:green;

}



.num:hover{

transform:scale(1.15);

}



button{

margin-top:30px;

width:160px;

height:60px;

font-size:25px;

cursor:pointer;

}



#info{

margin-top:20px;

font-size:25px;

}

.arthug-side{

position:absolute;

left:40px;

top:50%;

transform:translateY(-50%);

font-family:Georgia,serif;

font-size:50px;

font-weight:bold;

letter-spacing:5px;

line-height:1.1;

color:white;

text-align:center;

}


</style>

</head>


<body>

<div class="arthug-side">

A<br>
R<br>
T<br>
H<br>
U<br>
G<br>
<br>
C<br>
A<br>
S<br>
I<br>
N<br>
O

</div>


<div class="game">


<div>


<div class="wheel" id="wheel">

<span id="resultNumber">
0
</span>

</div>


<button id="spinButton" onclick="spin()" disabled>

转

</button>


<div id="info">

请选择下注

</div>


</div>





<div class="bet">



<script>


for(let i=1;i<=36;i++){

document.write(

`<div class="num ${i%2==1?'red':'black'}"
onclick="bet(${i})">

${i}

</div>`

);

}


</script>


</div>



</div>




<script>


let moneyBet=null;



function bet(number){


moneyBet=number;


document.getElementById("info").innerHTML=

"已下注(800$)："+number;

document.getElementById("spinButton").disabled=false;


}



function spin(){


let wheel=document.getElementById("wheel");


wheel.classList.remove("rotate");


void wheel.offsetWidth;


wheel.classList.add("rotate");

document.getElementById("spinButton").disabled=true;



setTimeout(()=>{


document.getElementById("info").innerHTML=

"不好意思，你输了800$，再试一次<br />请选择下注";

moneyBet=null;


},6000);



}



</script>


</body>

</html>
